            if (modal) {

                    video.pause();
                }
                modal.remove();

        // 豆包聊天功能
        function toggleDoubaoChat() {
            const chatWindow = document.getElementById('doubao-chat-window');
            chatWindow.classList.toggle('show');
        }
        
        function handleDoubaoChatKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendDoubaoChatMessage();
            }
        }
        
        function autoResizeDoubaoChatInput(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        }
        
        function sendDoubaoChatMessage() {
            const input = document.getElementById('doubao-chat-input');
            const message = input.value.trim();
            
            if (!message) return;
            
            // 添加用户消息
            addDoubaoChatMessage('user', message);
            input.value = '';
            input.style.height = 'auto';
            
            // 显示加载状态
            setDoubaoChatLoadingState(true);
            
            // 调用豆包API
            fetchDoubaoChatResponse(message)
                .then(response => {
                    // 添加豆包回复
                    addDoubaoChatMessage('doubao', response);
                })
                .catch(error => {
                    console.error('豆包API调用失败:', error);
                    addDoubaoChatMessage('doubao', '抱歉，我暂时无法回答你的问题。请稍后再试。');
                })
                .finally(() => {
                    // 隐藏加载状态
                    setDoubaoChatLoadingState(false);
                });
        }
        
        function addDoubaoChatMessage(sender, message) {
            const messagesContainer = document.getElementById('doubao-chat-messages');
            const messageElement = document.createElement('div');
            messageElement.className = `doubao-chat-message ${sender}`;
            messageElement.innerHTML = `
                <div class="doubao-chat-message-content">${message}</div>
            `;
            messagesContainer.appendChild(messageElement);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        function setDoubaoChatLoadingState(isLoading) {
            const messagesContainer = document.getElementById('doubao-chat-messages');
            const loadingElement = document.getElementById('doubao-chat-loading');
            
            if (isLoading) {
                if (!loadingElement) {
                    const newLoadingElement = document.createElement('div');
                    newLoadingElement.id = 'doubao-chat-loading';
                    newLoadingElement.className = 'doubao-chat-message doubao doubao-chat-loading';
                    newLoadingElement.innerHTML = `
                        <div class="doubao-chat-message-content">
                            <div class="doubao-chat-loading-indicator"></div>
                        </div>
                    `;
                    messagesContainer.appendChild(newLoadingElement);
                }
            } else {
                if (loadingElement) {
                    loadingElement.remove();
                }
            }
            
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        async function fetchDoubaoChatResponse(message) {
            const API_KEY = "42a8ebc6-afe0-41ef-a033-f62ac425b3c4";
            const API_URL = "https://ark.cn-beijing.volces.com/api/v3/chat/completions";
            
            const response = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "Doubao-Seed-1.8",
                    messages: [
                        {
                            role: "user",
                            content: message
                        }
                    ],
                    temperature: 0.7
                })
            });
            
            if (!response.ok) {
                throw new Error(`API调用失败: ${response.status} ${response.statusText}`);
            }
            
            const data = await response.json();
            return data.choices[0].message.content;
        }
        
        // 天气功能
        const WEATHER_API_KEY = '12bf4681f94333eab27a6999352234b3';
        const WEATHER_API_URL = 'https://restapi.amap.com/v3/weather/weatherInfo';

        function toggleWeather() {
            const weatherWindow = document.getElementById('weather-window');
            if (weatherWindow.classList.contains('show')) {
                weatherWindow.classList.remove('show');
            } else {
                weatherWindow.classList.add('show');
                getWeather();
            }
        }



        function getWeather() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        fetchCityCodeByCoords(lat, lon);
                    },
                    (error) => {
                        console.error('Geolocation error:', error.message || error);
                        // 默认使用北京的城市编码 110101
                        fetchWeatherByCityCode('110101');
                    }
                );
            } else {
                // 浏览器不支持地理位置，默认使用北京的城市编码 110101
                fetchWeatherByCityCode('110101');
            }
        }

        async function fetchCityCodeByCoords(lat, lon) {
            const weatherContent = document.getElementById('weather-content');
            weatherContent.innerHTML = `
                <div class="weather-loading">
                    <div class="loading-spinner"></div>
                    <p>正在获取位置信息...</p>
                </div>
            `;

            try {
                // 使用高德地图地理编码API获取城市编码
                const geoUrl = `https://restapi.amap.com/v3/geocode/regeo?key=${WEATHER_API_KEY}&location=${lon},${lat}&output=json`;
                const geoResponse = await fetch(geoUrl);
                
                if (!geoResponse.ok) {
                    throw new Error('Geocoding API request failed');
                }
                
                const geoData = await geoResponse.json();
                console.log('Geocoding data:', geoData);
                
                if (geoData.status !== '1') {
                    throw new Error(geoData.info || '获取位置信息失败');
                }
                
                // 从返回数据中获取城市编码
                const adcode = geoData.regeocode.addressComponent.adcode;
                if (adcode) {
                    await fetchWeatherByCityCode(adcode);
                } else {
                    // 如果获取不到城市编码，默认使用北京
                    await fetchWeatherByCityCode('110101');
                }
            } catch (error) {
                console.error('Error fetching city code:', error);
                // 出错时默认使用北京
                await fetchWeatherByCityCode('110101');
            }
        }

        async function fetchWeatherByCityCode(cityCode) {
            const weatherContent = document.getElementById('weather-content');
            weatherContent.innerHTML = `
                <div class="weather-loading">
                    <div class="loading-spinner"></div>
                    <p>正在加载天气预报数据...</p>
                </div>
            `;

            try {
                const response = await fetch(`${WEATHER_API_URL}?key=${WEATHER_API_KEY}&city=${cityCode}&extensions=all&output=json`);
                
                if (!response.ok) {
                    throw new Error('API request failed');
                }
                
                const data = await response.json();
                console.log('Weather forecast data:', data);
                
                if (data.status !== '1') {
                    throw new Error(data.info || '获取天气预报数据失败');
                }
                
                displayWeatherForecast(data);
            } catch (error) {
                console.error('Error fetching weather forecast:', error);
                weatherContent.innerHTML = `
                    <div class="weather-error">
                        <p>获取天气预报数据失败：${error.message}</p>
                        <p>请稍后再试</p>
                    </div>
                `;
            }
        }

        function displayWeatherForecast(data) {
            const weatherContent = document.getElementById('weather-content');
            const forecastData = data.forecasts[0];
            const casts = forecastData.casts;
            
            // 生成未来几天的预报HTML
            let forecastHTML = '';
            casts.forEach((day, index) => {
                const date = new Date(day.date);
                const formattedDate = date.toLocaleDateString('zh-CN', {
                    month: 'short',
                    day: 'numeric'
                });
                const weekDay = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'][date.getDay()];
                const dayLabel = index === 0 ? '今天' : weekDay;
                
                forecastHTML += `
                    <div class="weather-forecast-day">
                        <div class="forecast-date">${dayLabel}<br><small>${formattedDate}</small></div>
                        <div class="forecast-weather">
                            <div class="forecast-day-weather">白天: ${day.dayweather} ${day.daytemp}°C</div>
                            <div class="forecast-night-weather">夜间: ${day.nightweather} ${day.nighttemp}°C</div>
                        </div>
                        <div class="forecast-wind">
                            <div>${day.daywind}风 ${day.daypower}级</div>
                        </div>
                    </div>
                `;
            });

            weatherContent.innerHTML = `
                <div class="weather-main">
                    <div class="weather-location">${forecastData.province} ${forecastData.city}</div>
                    <div class="weather-date">未来天气预报</div>
                    <div class="weather-temp">${casts[0].daytemp}°C</div>
                    <div class="weather-description">${casts[0].dayweather}</div>
                </div>
                <div class="weather-forecast-container">
                    ${forecastHTML}
                </div>
                <div class="weather-report-time">发布时间: ${forecastData.reporttime}</div>
            `;
        }
        
        // 翻译功能
        function toggleTranslate() {
            const translateWindow = document.getElementById('translate-window');
            if (translateWindow.classList.contains('show')) {
                translateWindow.classList.remove('show');
            } else {
                translateWindow.classList.add('show');
                document.getElementById('translate-input').focus();
            }
        }
        
        async function translateText() {
            const input = document.getElementById('translate-input').value.trim();
            const sourceLang = document.getElementById('source-language').value;
            const targetLang = document.getElementById('target-language').value;
            const outputDiv = document.getElementById('translate-output');
            const translateButton = document.getElementById('translate-button');
            
            if (!input) {
                outputDiv.textContent = '请输入要翻译的文本';
                return;
            }
            
            // 显示加载状态
            outputDiv.textContent = '正在翻译...';
            translateButton.disabled = true;
            
            try {
                // 使用Lingva Translate API作为替代
                const encodedInput = encodeURIComponent(input);
                const response = await fetch(`https://lingva.ml/api/v1/${sourceLang}/${targetLang}/${encodedInput}`);
                
                if (!response.ok) {
                    throw new Error('翻译请求失败');
                }
                
                const data = await response.json();
                outputDiv.textContent = data.translation;
            } catch (error) {
                console.error('翻译错误:', error);
                outputDiv.textContent = '翻译失败，请稍后重试';
            } finally {
                translateButton.disabled = false;
            }
        }
    </script>
</body>
</html>
