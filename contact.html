    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        emailjs.init('v41YBHziPjDDBYRHW');
        
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;
            const btn = e.target.querySelector('.btn');
            const originalText = btn.textContent;
            
            btn.textContent = '发送中...';
            btn.disabled = true;
            
            const templateParams = {
                name: name,
                email: email,
                message: message
            };
            
            emailjs.send('service_mpc1lrs', 'template_ztday3l', templateParams)
                .then(function() {
                    alert('邮件发送成功！感谢您的留言！');
                    document.getElementById('contact-form').reset();
                })
                .catch(function(error) {
                    console.log('EmailJS发送失败，使用备用方案:', error);
                    const subject = encodeURIComponent('来自网站的留言 - ' + name);
                    const body = encodeURIComponent('姓名: ' + name + '\n邮箱: ' + email + '\n\n留言内容:\n' + message);
                    window.location.href = 'mailto:chaojunhu521@163.com?subject=' + subject + '&body=' + body;
                })
                .finally(function() {
                    btn.textContent = originalText;
                    btn.disabled = false;
                });
        });
        
        function toggleWechat() {
            const qrcode = document.getElementById('wechat-qrcode');
            if (qrcode.style.display === 'block') {
                qrcode.style.display = 'none';
            } else {
                qrcode.style.display = 'block';
            }
        }
        
        function openVideo() {
            const videoModal = document.createElement('div');
            videoModal.id = 'video-modal';
            videoModal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:10000;display:flex;flex-direction:column;justify-content:center;align-items:center;';
            
            videoModal.innerHTML = '<div style="position:absolute;top:20px;right:20px;color:#fff;font-size:36px;cursor:pointer;z-index:10002;width:50px;height:50px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,0.1);" onclick="closeVideo()">✕</div><div style="width:90%;max-width:1000px;aspect-ratio:16/9;background:#000;border-radius:8px;overflow:hidden;box-shadow:0 0 30px rgba(0,0,0,0.5);"><video id="main-video" controls style="width:100%;height:100%;object-fit:contain;"><source src="./videos/newyear-2026.mp4">您的浏览器不支持视频播放</video></div><p style="color:#fff;margin-top:20px;font-size:16px;">祝您马到成功，万事如意。</p>';
            
            document.body.appendChild(videoModal);
            document.body.style.overflow = 'hidden';
            
            videoModal.addEventListener('click', function(e) {
                if (e.target === videoModal) {
                    closeVideo();
                }
            });
        }
        
        function closeVideo() {
            const modal = document.getElementById('video-modal');
            if (modal) {
                const video = modal.querySelector('video');
                if (video) {
                    video.pause();
                }
                modal.remove();
                document.body.style.overflow = '';
            }
        }
        
        // 豆包聊天功能
        function toggleDoubaoChat() {
            const chatWindow = document.getElementById('doubao-chat-window');
            chatWindow.classList.toggle('show');
        }
        
        function handleDoubaoChatKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendDoubaoChatMessage();
            }
        }
        
        function autoResizeDoubaoChatInput(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        }
        
        function sendDoubaoChatMessage() {
            const input = document.getElementById('doubao-chat-input');
            const message = input.value.trim();
            
            if (!message) return;
            
            // 添加用户消息
            addDoubaoChatMessage('user', message);
            input.value = '';
            input.style.height = 'auto';
            
            // 显示加载状态
            setDoubaoChatLoadingState(true);
            
            // 调用豆包API
            fetchDoubaoChatResponse(message)
                .then(response => {
                    // 添加豆包回复
                    addDoubaoChatMessage('doubao', response);
                })
                .catch(error => {
                    console.error('豆包API调用失败:', error);
                    addDoubaoChatMessage('doubao', '抱歉，我暂时无法回答你的问题。请稍后再试。');
                })
                .finally(() => {
                    // 隐藏加载状态
                    setDoubaoChatLoadingState(false);
                });
        }
        
        function addDoubaoChatMessage(sender, message) {
            const messagesContainer = document.getElementById('doubao-chat-messages');
            const messageElement = document.createElement('div');
            messageElement.className = `doubao-chat-message ${sender}`;
            messageElement.innerHTML = `
                <div class="doubao-chat-message-content">${message}</div>
            `;
            messagesContainer.appendChild(messageElement);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        function setDoubaoChatLoadingState(isLoading) {
            const messagesContainer = document.getElementById('doubao-chat-messages');
            const loadingElement = document.getElementById('doubao-chat-loading');
            
            if (isLoading) {
                if (!loadingElement) {
                    const newLoadingElement = document.createElement('div');
                    newLoadingElement.id = 'doubao-chat-loading';
                    newLoadingElement.className = 'doubao-chat-message doubao doubao-chat-loading';
                    newLoadingElement.innerHTML = `
                        <div class="doubao-chat-message-content">
                            <div class="doubao-chat-loading-indicator"></div>
                        </div>
                    `;
                    messagesContainer.appendChild(newLoadingElement);
                }
            } else {
                if (loadingElement) {
                    loadingElement.remove();
                }
            }
            
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        async function fetchDoubaoChatResponse(message) {
            const API_KEY = "42a8ebc6-afe0-41ef-a033-f62ac425b3c4";
            const API_URL = "https://ark.cn-beijing.volces.com/api/v3/chat/completions";
            
            const response = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "Doubao-Seed-1.8",
                    messages: [
                        {
                            role: "user",
                            content: message
                        }
                    ],
                    temperature: 0.7
                })
            });
            
            if (!response.ok) {
                throw new Error(`API调用失败: ${response.status} ${response.statusText}`);
            }
            
            const data = await response.json();
            return data.choices[0].message.content;
             }
    </script>
